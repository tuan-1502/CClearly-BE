spring.application.name=cclearly


# Server Configuration

server.port=8080


# Database Configuration

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cclearly;encrypt=true;trustServerCertificate=true

spring.datasource.username=sa

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver


# JPA / Hibernate

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=true

spring.docker.compose.enabled=false


# SQL Initialization (auto-run data.sql after Hibernate creates tables)

spring.sql.init.mode=never

spring.sql.init.continue-on-error=true

spring.sql.init.encoding=UTF-8


# JWT Configuration (single token, 24 hours)

jwt.secret-key=${JWT_SECRET}

jwt.expiration=86400000

jwt.refresh-expiration=604800000


# App Configuration

app.otp.expiration-minutes=5

app.password-reset.expiration-minutes=30

app.frontend-url=http://localhost:3000


# CORS Configuration

app.cors.allowed-origins=http://localhost:3000,http://localhost:5173


# Cloudinary Configuration

cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}


# File Upload

spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB


# Email SMTP Configuration (Gmail)

spring.mail.host=smtp.gmail.com

spring.mail.port=587

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.starttls.required=true


# Google OAuth2 Configuration

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile



# AI Configuration (LM Studio Local - Disabled)
# lmstudio.endpoint=http://127.0.0.1:1234/v1/chat/completions
# lmstudio.model=moondream-2b-2025-04-14

# Google Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=


